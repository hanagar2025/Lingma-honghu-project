name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (typecheck + selftest + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-20-${{ hashFiles('package-lock.json') }}
      - name: Install (workspaces)
        run: |
          npm ci --workspaces --include-workspace-root --prefer-offline --no-audit --progress=false || \
          npm install --workspaces --include-workspace-root --legacy-peer-deps
      - name: Typecheck
        run: npx --workspace backend tsc --noEmit -p backend/tsconfig.json
      - name: TIOS engine selftest
        run: npm -w backend run tios:selftest
      - name: Run backend tests
        run: npm -w backend run test -- --coverage

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-20-${{ hashFiles('package-lock.json') }}
      - name: Install (workspaces)
        run: |
          npm ci --workspaces --include-workspace-root --prefer-offline --no-audit --progress=false || \
          npm install --workspaces --include-workspace-root --legacy-peer-deps
      - name: Typecheck
        run: npx --workspace frontend tsc --noEmit -p frontend/tsconfig.json
      - name: Build
        run: npm -w frontend run build
